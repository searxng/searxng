# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: true

search:
  default_lang: "ar-SA"
  languages:
    - "ar-SA"
    - "ar"
    - "en-US"
    - "all"

ui:
  default_locale: "ar"
  default_theme: simple

